; L2Voice — config universal (adaptativo — um unico voice.ini para todos)
; Mesma pasta da l2voice.dll (system\)
;
; overlay=auto + audio_profile=auto detectam sozinhos:
;   notebook / mic integrado     -> so escuta, SEM overlay (anti-crash no chat)
;   PC so caixas (sem fone)       -> so escuta
;   fone na saida sem mic externo -> so escuta
;   headset USB/BT com mic       -> fala + ouve + overlay (Insert)

[voice]
enabled = 1
auto_connect = 1
ws_url = ws://208.115.208.178:17667/ws

overlay = auto
audio_profile = auto

auth_token =
require_focus = 0
always_on = 0
receive_only = 0
overlay_toggle_vk = 45
overlay_restore_vk = 118

ptt_proximity = 32
ptt_party     = 119
ptt_clan      = 78
ptt_ally      = 77

min_dist_cm = 500
max_dist_cm = 2500
master_volume = 150

ch_enabled_0 = 1
ch_enabled_1 = 1
ch_enabled_2 = 1
ch_enabled_3 = 1
ch_volume_0 = 100
ch_volume_1 = 100
ch_volume_2 = 100
ch_volume_3 = 100

apm_aec = 1
apm_hpf = 1
apm_ns  = 1
apm_agc = 1

active_tx_channel = 0

overlay_delay_after_token_ms = 1500
overlay_fallback_inworld_ms = 6000
overlay_require_gs_token = 0

mic_icon_x = 0
mic_icon_y = 0
mini_list_x = 0
mini_list_y = 0
