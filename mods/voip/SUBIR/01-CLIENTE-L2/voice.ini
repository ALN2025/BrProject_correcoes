; =============================================================================
; L2Voice — CONFIG UNIVERSAL (adaptativo por usuario)
; Copiar para a MESMA pasta da l2voice.dll (Lineage2\system\)
; =============================================================================
;
; AUTO (overlay=auto + audio_profile=auto):
;   notebook / mic integrado     -> so escuta, SEM overlay (anti-crash no chat)
;   PC so caixas (sem fone)       -> so escuta
;   fone na saida sem mic externo -> so escuta
;   headset USB/BT com mic       -> fala + ouve + overlay (Insert)
;
; AUTO legado:
; - Headset/fone com mic -> fala + icone/painel (Insert)
; - PC com caixas e sem mic -> conecta, so escuta
; - Notebook/mic integrado -> so escuta, sem overlay 3D
;
[voice]
ws_url = ws://208.115.208.178:17667/ws
enabled = 1
auto_connect = 1

overlay = auto
audio_profile = auto

auth_token =
require_focus = 0
always_on = 0
receive_only = 0

overlay_toggle_vk = 45
overlay_restore_vk = 118

ptt_proximity = 32
ptt_party     = 119
ptt_clan      = 78
ptt_ally      = 77

min_dist_cm = 500
max_dist_cm = 2500
master_volume = 150

ch_enabled_0 = 1
ch_enabled_1 = 1
ch_enabled_2 = 1
ch_enabled_3 = 1
ch_volume_0 = 100
ch_volume_1 = 100
ch_volume_2 = 100
ch_volume_3 = 100

apm_aec = 1
apm_hpf = 1
apm_ns  = 1
apm_agc = 1

active_tx_channel = 0

; Overlay: mostra apos token; fallback se token atrasar
overlay_delay_after_token_ms = 2600
overlay_fallback_inworld_ms = 6000
overlay_require_gs_token = 0

; Posicao mic/lista mini (0,0 = auto abaixo HP)
mic_icon_x = 0
mic_icon_y = 0
mini_list_x = 0
mini_list_y = 0
