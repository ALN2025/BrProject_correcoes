<html><title>Settings Menu</title><body>
	<table width="300" cellpadding="2" cellspacing="2">
		<tr>
			<td><button width="30" height="30" back="Icon.etc_cross_of_einhasad_i01" fore="Icon.etc_cross_of_einhasad_i01"></td>
			<td width="150">Brproject<br1>
			Chronicle 6: Interlude</td>
			<td><font color="504f50">Online:</font> %online%<br1>
			<font color="504f50">Shops:</font> %trader%</td>
		</tr>
	</table>
	<img src=L2UI.SquareGray width=296 height=1>
	<table width="270" cellpadding="2" cellspacing="2">
		<tr>
			<td><button width=30 height=30 back=Icon.action006 fore=Icon.action006></td>
			<td width="200"><font color="0097ff">Experience:</font><br1>
			Status: %gainexp%</td>
			<td width="30">
				<button %button% width=75 height=21 back=L2UI_CH3.Btn1_normalOn fore=L2UI_CH3.Btn1_normal>
			</td>
		</tr>
	</table>
	<table width="270" cellpadding="2" cellspacing="2">
		<tr>
			<td width="2"><button width=30 height=30 back=Icon.action005 fore=Icon.action005></td>
			<td width="200"><font color="0097ff">Trade:</font><br1>
			Status: %trade%</td>
			<td width="30">
				<button %button1% width=75 height=21 back=L2UI_CH3.Btn1_normalOn fore=L2UI_CH3.Btn1_normal>
			</td>
		</tr>
	</table>
	<table width="270" cellpadding="2" cellspacing="2">
		<tr>
			<td width="2"><button width=30 height=30 back=Icon.action008 fore=Icon.action008></td>
			<td width="200"><font color="0097ff">Auto Loot:</font><br1>
			Status: %autoloot%</td>
			<td width="30">
				<button %button2% width=75 height=21 back=L2UI_CH3.Btn1_normalOn fore=L2UI_CH3.Btn1_normal>
			</td>
		</tr>
	</table>
	<table width="270" cellpadding="2" cellspacing="2">
		<tr>
			<td width="2"><button width=30 height=30 back=Icon.action008 fore=Icon.action008></td>
			<td width="200"><font color="0097ff">Buff Protection:</font><br1>
			Status: %buffprotect%</td>
			<td width="30">
				<button %button3% width=75 height=21 back=L2UI_CH3.Btn1_normalOn fore=L2UI_CH3.Btn1_normal>
			</td>
		</tr>
	</table>
	<table width="270" cellpadding="2" cellspacing="2">
		<tr>
			<td width="2"><button width=30 height=30 back=Icon.action018 fore=Icon.action018></td>
			<td width="200"><font color="0097ff">Offline Shop:</font></td>
			<td width="30">
				<button width="75" height="21" back="L2UI_ch3.Btn1_normalOn" fore="L2UI_ch3.Btn1_normal" action="bypass -h voiced_offline" value="Activate">
			</td>
		</tr>
	</table>
	<img src=L2UI.SquareGray width=296 height=1>
	<table width="300" cellpadding="2" cellspacing="2">
		<tr>
			<td align=center><font color="504f50">Max online since restart:</font> %maxOnline%<br1>
			<font color="504f50">Server time:</font> %serverTime%<br1>
			<font color="504f50">Last restart:</font> %lastRestart%</td>
		</tr>
	</table>
	<br>
	<table bgcolor="666666" width="260" cellspacing="2" cellpadding="0">
		<tr>
			<td align="center">
				<button width="130" height="25" back="Ressurge.BTN02" fore="Ressurge.BTN02" action="bypass -h voiced_lang pt_BR open" value="PORTUGUESE">
			</td>
			<td align="center">
				<button width="130" height="25" back="Ressurge.BTN02" fore="Ressurge.BTN02" action="bypass -h voiced_lang en_US open" value="ENGLISH">
			</td>
		</tr>
		<tr>
			<td width="10"></td>
			<td align="center">
				<button width="130" height="25" back="Ressurge.BTN02" fore="Ressurge.BTN02" action="bypass -h voiced_lang ru_RU open" value="RUSSIAN">
			</td>
			<td width="10"></td>
		</tr>
	</table>
	<br>
	<table bgcolor="666666" width="260" cellspacing="2" cellpadding="2">
		<tr>
			<td align="center" colspan="2">
				<button width="240" height="25" back="Ressurge.BTN02" fore="Ressurge.BTN02" action="bypass -h admin_link events/events.htm" value="EVENTS / MODS">
			</td>
		</tr>
	</table>
	<br>
	<table bgcolor="666666" width="260" cellspacing="2" cellpadding="2">
		<tr>
			<td width="2"><button width=30 height=30 back=Icon.action041 fore=Icon.action041></button></td>
			<td align="center">
				<button width="90" height="25" back="Ressurge.BTN02" fore="Ressurge.BTN02" action="bypass -h admin_ctf_start" value="CTF START">
			</td>
			<td align="center">
				<button width="90" height="25" back="Ressurge.BTN02" fore="Ressurge.BTN02" action="bypass -h admin_dm_start" value="DM START">
			</td>
		</tr>
		<tr>
			<td align="center">
				<button width="90" height="25" back="Ressurge.BTN02" fore="Ressurge.BTN02" action="bypass -h admin_lm_start" value="LM START">
			</td>
			<td align="center">
				<button width="90" height="25" back="Ressurge.BTN02" fore="Ressurge.BTN02" action="bypass -h admin_tvt_start" value="TVT START">
			</td>
		</tr>
	</table>
</body></html>
